<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 48px auto; padding: 0 16px; }
        label { display: block; margin-top: 16px; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 10px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
        .msg { margin-top: 16px; padding: 12px; border-radius: 8px; }
        .err { background: #fee; color: #800; }
        .ok { background: #efe; color: #060; }
    </style>
</head>
<body>
    <h1>Set a new password</h1>
    <p id="tokenWarn" class="msg err" style="display:none">Missing or invalid reset link. Request a new link from the login page.</p>
    <form id="form" style="display:none">
        <label>New password (min 8 characters)<input type="password" id="pw" required minlength="8" autocomplete="new-password"></label>
        <label>Confirm password<input type="password" id="pw2" required minlength="8" autocomplete="new-password"></label>
        <button type="submit">Update password</button>
    </form>
    <div id="out"></div>
    <p><a href="/admin">Back to login</a></p>
    <script>
        const params = new URLSearchParams(location.search);
        const token = params.get('token') || '';
        const form = document.getElementById('form');
        const warn = document.getElementById('tokenWarn');
        if (!token) {
            warn.style.display = 'block';
        } else {
            form.style.display = 'block';
        }
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const password = document.getElementById('pw').value;
            const confirm_password = document.getElementById('pw2').value;
            const out = document.getElementById('out');
            out.innerHTML = '';
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password, confirm_password }),
            });
            const json = await res.json().catch(() => ({}));
            const div = document.createElement('div');
            div.className = 'msg ' + (json.success ? 'ok' : 'err');
            div.textContent = json.message || (json.success ? 'Password updated. You can sign in now.' : 'Something went wrong.');
            out.appendChild(div);
            if (json.success) {
                form.reset();
                setTimeout(() => { location.href = '/admin'; }, 1500);
            }
        });
    </script>
</body>
</html>
